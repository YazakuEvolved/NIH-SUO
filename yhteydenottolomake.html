<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>NIH-SUO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <link rel="canonical" href="https://nihsuo.com/yhteydenottolomake.html">
</head>

<body>
<!-- ==================================== -->
<!--               Yliö                   -->
<!-- Logo joka toimii linkkinä etusivulle -->
<!-- ==================================== -->
<header class="topline">
		<a href="nih-suo.html" class="logo-link">
        	<img src="Logo.svg" alt="Sivuston logo" class="logo-small">
    	</a>
    <p>Nih-Suo</p>
<!-- =========================== -->
<!-- Tumman teeman valintakytkin -->
<!-- =========================== -->
    	<div>
        	<button id="theme-toggle">光 / 闇</button>
    	</div>
</header>

<main class="content">
<!-- ========================= -->
<!--      Sivun pääotsikko     -->
<!-- ========================= -->
    <h1>Yhteydenottolomake</h1>
<!-- ========================= -->
<!--          Ohjelma          -->
<!-- ========================= -->
<form id="contact-form">
  <input type="email" name="user_email" placeholder="Your email" required>
  <textarea name="message" placeholder="Message" required></textarea>
  <button type="submit">Send</button>
</form>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
(function(){
  emailjs.init("Fb2Vp9MACgnBzPpUz");
})();

document.getElementById("contact-form").addEventListener("submit", function(e) {
  e.preventDefault();

  emailjs.sendForm("service_iybv3fs", "template_b8npuxd", this)
    .then(() => alert("Message sent!"))
    .catch(() => alert("Error, try again"));
});
</script>
<!-- ========================= -->
<!--    Takasin etusivulle     -->
<!-- ========================= -->
    <p>
        <a href="nih-suo.html">← Takaisin etusivulle</a>
    </p>
</main>
<!-- ========================= -->
<!--        Alapalkki          -->
<!-- ========================= -->
<footer  class="bottomline">
    <p>© 2026 Lyytikäinen Aki. All rights reserved.</p>
</footer>
<!-- ============================ -->
<!-- Tumman teeman valinta script -->
<!-- ============================ -->
<script>
    const toggleButton = document.getElementById('theme-toggle');

    // Lataa tallennettu teema
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
    }

    toggleButton.addEventListener('click', () => {
        document.body.classList.toggle('dark');

        if (document.body.classList.contains('dark')) {
            localStorage.setItem('theme', 'dark');
        } else {
            localStorage.setItem('theme', 'light');
        }
    });
</script>
</body>
</html>
